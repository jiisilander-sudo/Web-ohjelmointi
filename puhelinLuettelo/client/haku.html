<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Puhelinluettelo – Haku</title>
    <link rel="stylesheet" href="style.css" />
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script> <!-- Asentaa käyttöön jQuery kirjaston -->
  </head>
  <body>
    <!-- Otsikko osio, sisältää navigoinnin sivujen välillä, hakee ulkoasun style.css:stä -->
  <div id="container">
      <div id="header">
        <h1>Hae numeroa</h1>
      </div>
      <!-- Navigointi sivujen välillä, hakee ulkoasun style.css -->
      <div id="nav">
        <ul>
          <li><a href="index.html">Alku</a></li>
          <li><a href="puhelinluettelo.html">Puhelinluettelo</a></li>
          <li><a  class="active" href="haku.html">Hae henkilöä</a></li>
        </ul>
      </div>
    </div>
    <!-- Taulukko, sisältää kentät nimelle + numerolle ja napin haku funktiolle, hakee ulkoasun style.css:stä -->
    <class="form">
      <table id="taulukko">
        <tr>
          <td><label for="nimi">Nimi:</label></td>
          <td><input type="text" id="nimi" /></td>
          <td><button id="hae">Hae puhelinnumero</button></td>
        </tr>
        <tr>
          <td><label for="puhelin">Puhelinnumero:</label></td>
          <td><input type="text" id="puhelin" readonly /></td>
        </tr>
      </table>
    </div>
    </div>
    <!-- Osio, joka hakee serveriltä JSON-muodossa olevan datan joka hakee nimellä puh.numeroa -->
    <script>  
      $("#hae").click(function () {
        $.getJSON("http://localhost:3000/data", function (data) {
          let nimi = $("#nimi").val().trim();
          let henkilo = data.find(
            (henk) => henk.nimi.toLowerCase() === nimi.toLowerCase(),       // Hyväksyy myös pienen alkukirjaimen
          );                     
          if (henkilo) {                                              // Jos henkilö löytyy näytetään numero puhelin kentässä
            $("#puhelin").val(henkilo.puhelin);
          } else {                                                    // Jos ei
            $("#puhelin").val("Ei löytynyt");
          }
        });
      });
    </script>
  </body>
</html>
