<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
      crossorigin="anonymous"
    />
    <title>Document</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div id="header2">
      <h1>Muokkaus</h1>
      <a href="index.html">Takaisin etusivulle</a>
    </div>
    <form action="http://localhost:3000/items" id="puhelintieto_lomake">
      <div class="mb-3 mt-3">
        <label for="nimi" class="form-label">
          Nimi:
          <input type="text" name="nimi" id="nimi" class="form-control" />
        </label>
      </div>
      <div class="mb-3 mt-3">
        <label for="puhelin" class="form-label">
          Puhelin:
          <input type="text" name="puhelin" id="puhelin" class="form-control" />
        </label>
      </div>
      <input type="submit" value="Luo uusi puhelintieto" />
    </form>
    <table class="table table-striped"></table>
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
      crossorigin="anonymous"
    ></script>
    <script src="./script2.js"></script>
    <!-- script3.js sisältää muokkaustoiminnot -->
    <script src="./script3.js"></script>
    <!-- Modal pop-up ikkuna, aukeaa muokkaa-painikkeesta -->
    <div class="modal fade" id="editModal" tabindex="-1" aria-hidden="true">
      <div class="modal-dialog">
        <div class="modal-content">
          <div class="modal-header">
            <h5 class="modal-title">Muokkaa käyttäjää</h5>
            <button
              type="button"
              class="btn-close"
              data-bs-dismiss="modal"
              aria-label="Close"
            ></button>
          </div>
          <div class="modal-body">
            <!-- Muokkausikkuna -->
            <input type="hidden" id="muokkaaId" />
            <div class="mb-3">
              <label class="form-label">Nimi</label>
              <!-- Tämä on readonly-kenttä, jotta nimeä ei voi muokata  -->
              <input
                type="text"
                id="muokkaaNimi"
                class="form-control"
                readonly
              />
            </div>
            <div class="mb-3">
              <label class="form-label">Puhelin</label>
              <input type="text" id="muokkaaPuhelin" class="form-control" />
            </div>
          </div>
          <div class="modal-footer">
            <button
              type="button"
              class="btn btn-secondary"
              data-bs-dismiss="modal"
            >
              Peruuta
            </button>
            <!-- Suorittaa saveUser-funktion, löytyy script3:sta -->
            <button type="button" class="btn btn-primary" onclick="saveUser()">
              Tallenna
            </button>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
